name: Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build Python Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd telegram-agent
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller agent.spec
          copy dist\telegram-agent.exe ..\src-tauri\telegram-agent-x86_64-pc-windows-msvc.exe

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          VITE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cầm Đồ 55 - Bản cập nhật ${{ github.ref_name }}'
          releaseBody: 'Xem thông tin bản cập nhật để biết thêm chi tiết.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --verbose

      - name: Debug Output Artifacts (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "Listing all files in src-tauri/target/release/bundle/macos/"
          ls -la src-tauri/target/release/bundle/macos/ || true
          
          echo "Generating latest.json manually..."
          SIG_FILE=$(find src-tauri/target/release/bundle/macos -name "*.app.tar.gz.sig" | head -n 1)
          if [ -f "$SIG_FILE" ]; then
            SIG=$(<"$SIG_FILE")
            VERSION="${{ github.ref_name }}"
            VERSION=${VERSION#v}
            URL="https://github.com/phantathoang/cam-do-55/releases/download/${{ github.ref_name }}/C.m.D.55_aarch64.app.tar.gz"
            
            echo '{
              "version": "'"$VERSION"'",
              "notes": "Bản cập nhật '"$VERSION"'",
              "pub_date": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'",
              "platforms": {
                "darwin-aarch64": {
                  "signature": "'"$SIG"'",
                  "url": "'"$URL"'"
                },
                "darwin-x86_64": {
                  "signature": "'"$SIG"'",
                  "url": "'"$URL"'"
                }
              }
            }' > latest.json
            cat latest.json
          else
            echo "ERROR: Signature file not found! tauri build failed to sign."
          fi

      - name: Upload latest.json to Release (macOS only)
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
