name: Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin --bundles app,dmg'
          - platform: 'windows-latest'
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build Python Sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd telegram-agent
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller agent.spec
          copy dist\agent.exe ..\src-tauri\telegram-agent-x86_64-pc-windows-msvc.exe

      - name: Install frontend dependencies
        run: npm install

      - name: Format Private Key
        env:
          RAW_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: node -e "const fs=require('fs'); const path=require('path'); let key=process.env.RAW_KEY; if(key){ if(!key.startsWith('untrusted comment:')){ key=key.replace(/\s/g,''); }else{ key=key.replace(/\r/g,''); } const keyPath=path.resolve('tauri_private.key'); fs.writeFileSync(keyPath,key,'utf8'); fs.appendFileSync(process.env.GITHUB_ENV, 'TAURI_KEY_PATH=' + keyPath.split(path.sep).join('/') + '\n', 'utf8'); }"

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ env.TAURI_KEY_PATH }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_KEY_PATH }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          VITE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cầm Đồ 55 - Bản cập nhật ${{ github.ref_name }}'
          releaseBody: 'Xem thông tin bản cập nhật để biết thêm chi tiết.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: --verbose ${{ matrix.args }}

  publish-updater:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Generate universal latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install requests
          python -c '
          import os, requests, json
          token = os.environ.get("GITHUB_TOKEN")
          repo = "${{ github.repository }}"
          tag = "${{ github.ref_name }}"
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"} if token else {}
          res = requests.get(f"https://api.github.com/repos/{repo}/releases/tags/{tag}", headers=headers)
          res.raise_for_status()
          assets = res.json()["assets"]
          
          platforms = {}
          version = tag.lstrip("v")
          
          for asset in assets:
              name = asset["name"]
              url = asset["browser_download_url"]
              if name.endswith(".sig"):
                  sig_res = requests.get(url)
                  sig = sig_res.text.strip()
                  
                  if "aarch64" in name and "tar.gz.sig" in name:
                      platforms["darwin-aarch64"] = {"signature": sig, "url": url.replace(".sig", "")}
                      platforms["darwin-x86_64"] = {"signature": sig, "url": url.replace(".sig", "")}
                  elif "x64" in name and ("zip.sig" in name or "exe.sig" in name):
                      platforms["windows-x86_64"] = {"signature": sig, "url": url.replace(".sig", "")}
                      
          latest = {
              "version": version,
              "notes": f"Bản cập nhật {version}",
              "pub_date": res.json()["published_at"],
              "platforms": platforms
          }
          
          with open("latest.json", "w") as f:
              json.dump(latest, f, indent=2)
          '
          cat latest.json

      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
