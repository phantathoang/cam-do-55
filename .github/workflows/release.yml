name: Release Tauri App

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          VITE_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cầm Đồ 55 - Bản cập nhật ${{ github.ref_name }}'
          releaseBody: 'Xem thông tin bản cập nhật để biết thêm chi tiết.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --verbose

      - name: Debug Output Artifacts
        run: |
          echo "Listing all files in src-tauri/target/release/bundle/macos/"
          ls -la src-tauri/target/release/bundle/macos/ || true
          echo "Listing all files in src-tauri/target/release/bundle/dmg/"
          ls -la src-tauri/target/release/bundle/dmg/ || true
